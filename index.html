<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --calc-body: #1a1c1e;
            --screen-bg: #cbd5cb;
            --btn-blue: #4a6a8a;
            --btn-dark: #25282b;
            --btn-op: #38424d;
            --text-gold: #c5a059;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: var(--calc-body);
            width: 320px;
            padding: 20px;
            border-radius: 20px 20px 80px 80px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid #000;
            position: relative;
        }

        .brand-header {
            text-align: center;
            color: #999;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        /* DEG/RAD indicator */
        #mode-indicator {
            text-align: right;
            font-size: 9px;
            color: var(--text-gold);
            font-weight: bold;
            letter-spacing: 1px;
            padding-right: 4px;
            margin-bottom: 4px;
        }

        #display-container {
            background-color: var(--screen-bg);
            border: 4px inset #555;
            border-radius: 4px;
            padding: 6px 10px 8px;
            height: 85px;
            margin-bottom: 25px;
            box-shadow: inset 2px 2px 10px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* History line above main display */
        #history-line {
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            color: #555;
            text-align: right;
            height: 16px;
            overflow: hidden;
            white-space: nowrap;
        }

        #display {
            width: 100%;
            border: none;
            background: transparent;
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            color: #1a1a1a;
            outline: none;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px 8px;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sec-function {
            font-size: 8px;
            color: var(--text-gold);
            margin-bottom: 2px;
            height: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        button.calc-btn {
            width: 48px;
            height: 34px;
            border-radius: 6px;
            border: none;
            color: white;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #000;
            background-color: var(--btn-dark);
            transition: 0.1s;
        }

        button.calc-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #000;
        }

        .nav-btn {
            border-radius: 50% !important;
            height: 40px !important;
            background-color: #333 !important;
        }

        .blue-btn  { background-color: var(--btn-blue) !important; }
        .op-btn    { background-color: var(--btn-op) !important; }
        .clr-btn   { background-color: #8b0000 !important; }
        .mode-btn  { background-color: #2e5e3e !important; font-size: 9px !important; }

        /* HUB STYLES */
        #hub-container {
            display: none;
            background: #0b0b0b;
            min-height: 100vh;
            color: white;
            position: fixed;
            inset: 0;
            z-index: 9999;
            font-family: sans-serif;
            overflow-y: auto;
        }

        #top-nav {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .game-card {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #444;
        }

        .game-card:hover { border-color: #00ffcc; }

        #player { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        iframe   { width: 100%; height: 100%; border: none; }
        #close-btn {
            position: fixed; top: 10px; right: 10px; z-index: 10001;
            padding: 10px; background: red; color: white; border: none;
            cursor: pointer; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="calc-ui">
    <div class="calculator">
        <div class="brand-header">TEXAS INSTRUMENTS TI-30XIIS</div>
        <div id="mode-indicator">DEG</div>
        <div id="display-container">
            <div id="history-line"></div>
            <input type="text" id="display" placeholder="0" readonly>
        </div>

        <div class="btn-grid">

            <!-- Row 1: 2nd + nav -->
            <div class="btn-wrapper"><div class="sec-function">STAT</div><button class="calc-btn blue-btn" onclick="toggle2nd()">2nd</button></div>
            <div class="btn-wrapper"><div class="sec-function">EXIT</div><button class="calc-btn nav-btn" onclick="historyBack()">◀</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn nav-btn">▲</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn nav-btn">▼</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn nav-btn">▶</button></div>

            <!-- Row 2: LOG LN x² ^ CLR -->
            <div class="btn-wrapper"><div class="sec-function">10ⁿ</div><button class="calc-btn op-btn" id="btn-log" onclick="mathFunc('log')">LOG</button></div>
            <div class="btn-wrapper"><div class="sec-function">eⁿ</div><button class="calc-btn op-btn" onclick="mathFunc('ln')">LN</button></div>
            <div class="btn-wrapper"><div class="sec-function">√</div><button class="calc-btn op-btn" id="btn-sq" onclick="mathFunc('sq')">x²</button></div>
            <div class="btn-wrapper"><div class="sec-function">DEG/RAD</div><button class="calc-btn mode-btn" onclick="toggleMode()">MODE</button></div>
            <div class="btn-wrapper"><div class="sec-function">OFF</div><button class="calc-btn clr-btn" onclick="clearDisplay()">CLR</button></div>

            <!-- Row 3: SIN COS TAN π ÷ -->
            <div class="btn-wrapper"><div class="sec-function">sin⁻¹</div><button class="calc-btn op-btn" id="btn-sin" onclick="mathFunc('sin')">SIN</button></div>
            <div class="btn-wrapper"><div class="sec-function">cos⁻¹</div><button class="calc-btn op-btn" id="btn-cos" onclick="mathFunc('cos')">COS</button></div>
            <div class="btn-wrapper"><div class="sec-function">tan⁻¹</div><button class="calc-btn op-btn" id="btn-tan" onclick="mathFunc('tan')">TAN</button></div>
            <div class="btn-wrapper"><div class="sec-function">π</div><button class="calc-btn op-btn" onclick="mathFunc('pi')">π</button></div>
            <div class="btn-wrapper"><div class="sec-function">÷</div><button class="calc-btn op-btn" onclick="appendToDisplay('/')">÷</button></div>

            <!-- Row 4: 7 8 9 × − -->
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('7')">7</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('8')">8</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('9')">9</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn op-btn" onclick="appendToDisplay('*')">×</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn op-btn" onclick="appendToDisplay('-')">−</button></div>

            <!-- Row 5: 4 5 6 ENTER + -->
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('4')">4</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('5')">5</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('6')">6</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn blue-btn" onclick="calculate()" style="height:85px; position:absolute; z-index:10;">ENTER</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn op-btn" onclick="appendToDisplay('+')">+</button></div>

            <!-- Row 6: 1 2 3 [gap] . -->
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('1')">1</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('2')">2</button></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn" onclick="appendToDisplay('3')">3</button></div>
            <div class="btn-wrapper"></div>
            <div class="btn-wrapper"><div class="sec-function"></div><button class="calc-btn op-btn" onclick="appendToDisplay('.')">.</button></div>

            <!-- Row 7: 0 ANS ) ⌫ -->
            <div class="btn-wrapper"><div class="sec-function">FIX</div><button class="calc-btn" onclick="appendToDisplay('0')">0</button></div>
            <div class="btn-wrapper"><div class="sec-function">ANS</div><button class="calc-btn op-btn" onclick="insertAns()">ANS</button></div>
            <div class="btn-wrapper"><div class="sec-function">(</div><button class="calc-btn op-btn" onclick="appendToDisplay('(')">(</button></div>
            <div class="btn-wrapper"><div class="sec-function">)</div><button class="calc-btn op-btn" onclick="appendToDisplay(')')">)</button></div>
            <div class="btn-wrapper"><div class="sec-function">DEL</div><button class="calc-btn clr-btn" onclick="backspace()">⌫</button></div>

        </div>
    </div>
</div>

<div id="hub-container">
    <div id="top-nav"><h2>System Database Cache</h2></div>
    <div id="game-grid"></div>
</div>

<div id="player">
    <button id="close-btn" onclick="closeGame()">EXIT SESSION</button>
    <iframe id="frame"></iframe>
</div>

<script>
    const display     = document.getElementById('display');
    const historyLine = document.getElementById('history-line');
    const modeIndicator = document.getElementById('mode-indicator');
    const hub    = document.getElementById('hub-container');
    const calcUI = document.getElementById('calc-ui');

    let lastAnswer = null;
    let isDegree   = true;   // true = DEG, false = RAD
    let is2nd      = false;  // 2nd function toggle
    let calcHistory = [];    // list of past expressions

    // ── helpers ──────────────────────────────────────────────────────────────
    function appendToDisplay(v) { display.value += v; }

    function clearDisplay() {
        display.value   = "";
        historyLine.textContent = "";
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function insertAns() {
        if (lastAnswer !== null) appendToDisplay(lastAnswer);
    }

    // ── DEG / RAD toggle ─────────────────────────────────────────────────────
    function toggleMode() {
        isDegree = !isDegree;
        modeIndicator.textContent = isDegree ? "DEG" : "RAD";
    }

    // ── 2nd function toggle ───────────────────────────────────────────────────
    function toggle2nd() {
        is2nd = !is2nd;
        document.getElementById('btn-sin').textContent = is2nd ? 'sin⁻¹' : 'SIN';
        document.getElementById('btn-cos').textContent = is2nd ? 'cos⁻¹' : 'COS';
        document.getElementById('btn-tan').textContent = is2nd ? 'tan⁻¹' : 'TAN';
        document.getElementById('btn-sq').textContent  = is2nd ? '√'     : 'x²';
        document.getElementById('btn-log').textContent = is2nd ? '10ⁿ'   : 'LOG';
        // highlight 2nd button
        document.querySelector('.blue-btn').style.outline = is2nd ? '2px solid #c5a059' : 'none';
    }

    // ── math functions ────────────────────────────────────────────────────────
    function toRad(deg)  { return deg * (Math.PI / 180); }
    function toDeg(rad)  { return rad * (180 / Math.PI); }

    function mathFunc(type) {
        let val = parseFloat(display.value) || 0;

        if (is2nd) {
            // inverse trig → always returns degrees
            if (type === 'sin') { display.value = toDeg(Math.asin(val)).toFixed(4); }
            if (type === 'cos') { display.value = toDeg(Math.acos(val)).toFixed(4); }
            if (type === 'tan') { display.value = toDeg(Math.atan(val)).toFixed(4); }
            if (type === 'sq')  { display.value = Math.sqrt(val).toFixed(4); }
            if (type === 'log') { display.value = Math.pow(10, val).toFixed(4); }
            toggle2nd(); // reset 2nd
            return;
        }

        if (type === 'log') { display.value = Math.log10(val).toFixed(4); }
        if (type === 'ln')  { display.value = Math.log(val).toFixed(4); }
        if (type === 'sq')  { display.value = Math.pow(val, 2); }
        if (type === 'pi')  { display.value += Math.PI.toFixed(8); }

        // trig: convert if in degree mode
        if (type === 'sin') { display.value = Math.sin(isDegree ? toRad(val) : val).toFixed(8); }
        if (type === 'cos') { display.value = Math.cos(isDegree ? toRad(val) : val).toFixed(8); }
        if (type === 'tan') { display.value = Math.tan(isDegree ? toRad(val) : val).toFixed(8); }
    }

    // ── history navigation ────────────────────────────────────────────────────
    let historyIndex = -1;

    function historyBack() {
        if (calcHistory.length === 0) return;
        historyIndex = Math.min(historyIndex + 1, calcHistory.length - 1);
        display.value = calcHistory[calcHistory.length - 1 - historyIndex].expr;
    }

    // ── calculate ─────────────────────────────────────────────────────────────
    function calculate() {
        const isLocked = localStorage.getItem('calculatorLocked') === 'true';

        if (display.value === "1234") {
            if (isLocked) {
                alert("Error: System Diagnostic Disabled by Administrator.");
                clearDisplay();
            } else {
                if (confirm("Warning: System diagnostic mode requested. Access local server cache?")) {
                    openHub();
                } else {
                    clearDisplay();
                }
            }
            return;
        }

        try {
            const expr = display.value.replace(/×/g, '*').replace(/÷/g, '/').replace(/\*\*/g, '**');
            const result = eval(expr);
            historyLine.textContent = display.value + " =";
            calcHistory.push({ expr: display.value, result });
            historyIndex = -1;
            lastAnswer = result;
            display.value = result;
        } catch {
            display.value = "Error";
        }
    }

    // ── keyboard support ──────────────────────────────────────────────────────
    window.addEventListener('keydown', (e) => {
        if (e.key === "Escape") { location.reload(); return; }
        if (hub.style.display === "block") return;

        if ((e.key >= '0' && e.key <= '9') || e.key === '.' || e.key === '(' || e.key === ')') {
            appendToDisplay(e.key);
        } else if (['+', '-', '*', '/'].includes(e.key)) {
            appendToDisplay(e.key);
        } else if (e.key === 'Enter') {
            calculate();
        } else if (e.key === 'Backspace') {
            backspace();
        } else if (e.key === 'c' || e.key === 'C') {
            clearDisplay();
        }
    });

    // ── hub ───────────────────────────────────────────────────────────────────
    async function openHub() {
        calcUI.style.display = "none";
        hub.style.display    = "block";
        try {
            const res   = await fetch('games.json');
            const games = await res.json();
            const grid  = document.getElementById('game-grid');
            grid.innerHTML = "";
            games.forEach(g => {
                const div       = document.createElement('div');
                div.className   = "game-card";
                div.innerHTML   = `<div style="font-size:11px;color:#888;margin-bottom:6px">${g.cat}</div><div>${g.name}</div>`;
                div.onclick = () => {
                    document.getElementById('player').style.display = "block";
                    document.getElementById('frame').src = g.url;
                };
                grid.appendChild(div);
            });
        } catch (e) { alert("Error: Cache not found."); }
    }

    function closeGame() {
        document.getElementById('player').style.display = "none";
        document.getElementById('frame').src = "";
    }
</script>
</body>
</html>
